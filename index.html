<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Snake Game</h1>

  <div class="game-container">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
  </div>

  <div class="game-info">
    <p>Score: <span id="score">0</span></p>
    <p>High Score: <span id="highScore">0</span></p>
    <p>Time: <span id="timer">00:00</span></p>
  </div>

  <p class="instruction">Use arrow keys to move the snake.</p>
  
  <div class="mobile-controls">
  <button onclick="setDirection('UP')">▲</button>

  <div>
    <button onclick="setDirection('LEFT')">◀</button>
    <button onclick="setDirection('DOWN')">▼</button>
    <button onclick="setDirection('RIGHT')">▶</button>
  </div>
</div>

  <div id="setupControls">
    <div class="level-row">
      <label for="difficulty">Choose Level:</label>

      <select id="difficulty">
        <option value="220">Easy</option>
        <option value="150" selected>Medium</option>
        <option value="90">Hard</option>
      </select>
    </div>

    <div class="button-row">
      <button id="startButton" onclick="startGame()">Start Game</button>
    </div>
  </div>

  <div class="button-row">
    <button id="restartButton" onclick="restartGame()">Restart Game</button>
    <button id="pauseButton" onclick="togglePauseGame()">Pause Game</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
